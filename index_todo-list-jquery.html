<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Список задач - jQuery</title>
  <link rel="stylesheet" type="text/css" href="style_todo-list-jquery.css" />
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="index_todo-list-jquery.js" defer></script>
</head>
<body>

  <ul id="todo-list"></ul>
</body>
</html>
